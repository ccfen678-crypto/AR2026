<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/1.7.1/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

  <a-scene embedded arjs>

    <!-- Hiro Marker -->
    <a-marker preset="hiro">

      <!-- Sun -->
      <a-sphere
        radius="1"
        position="0 0 0"
        src="surface.jpg">
      </a-sphere>

      <!-- Orbit Container -->
      <a-entity
        animation="property: rotation;
                   to: 0 360 0;
                   loop: true;
                   dur: 5000;
                   easing: linear">

        <!-- Earth Position -->
        <a-entity position="2 0 0">

          <!-- Earth -->
          <a-sphere
            radius="0.5"
            src="earth.jpg"
            animation="property: rotation;
                       to: 0 360 0;
                       loop: true;
                       dur: 1000;
                       easing: linear">
          </a-sphere>

        </a-entity>

      </a-entity>

    </a-marker>

    <!-- Camera -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
